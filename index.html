<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2c5f8d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="教職教養">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>教職教養 ランダム演習</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #2c5f8d;
    --primary-dark: #1e4566;
    --accent: #e67e22;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --text: #2c3e50;
    --muted: #7f8c8d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    background: linear-gradient(135deg, #d4e4f4 0%, #f0f4f8 60%, #e8f0e8 100%);
    min-height: 100vh;
    color: var(--text);
    padding: 16px;
    padding-top: calc(16px + env(safe-area-inset-top));
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    padding-left: calc(16px + env(safe-area-inset-left));
    padding-right: calc(16px + env(safe-area-inset-right));
  }
  button {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    font-family: inherit;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header {
    text-align: center;
    padding: 24px 0 16px;
  }
  header h1 { font-size: 1.5rem; color: var(--primary-dark); letter-spacing: 0.05em; }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }
  .card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 16px rgba(44, 95, 141, 0.12);
    padding: 28px;
    margin-bottom: 16px;
  }
  .hidden { display: none !important; }

  /* ===== start screen ===== */
  .field-label { font-weight: bold; color: var(--primary-dark); margin: 18px 0 8px; font-size: 0.95rem; }
  .option-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .option-grid button {
    border: 2px solid var(--primary);
    background: #fff;
    color: var(--primary);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .option-grid button.selected {
    background: var(--primary);
    color: #fff;
  }
  .start-btn, .restart-btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 16px;
    font-size: 1.1rem;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), #d35400);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(230, 126, 34, 0.4);
  }
  .start-btn:hover, .restart-btn:hover { transform: translateY(-2px); }
  .note { font-size: 0.8rem; color: var(--muted); margin-top: 14px; line-height: 1.6; }

  /* ===== stats ===== */
  #stats-panel { margin-top: 4px; }
  .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 0.82rem; }
  .stat-label { width: 124px; flex-shrink: 0; }
  .stat-bar { flex: 1; height: 10px; background: #e8eef4; border-radius: 5px; overflow: hidden; }
  .stat-bar > div { height: 100%; background: linear-gradient(90deg, var(--correct), #7dcea0); }
  .stat-pct { width: 42px; text-align: right; color: var(--muted); }
  .stat-sub { font-size: 0.78rem; color: var(--muted); margin: 6px 0 0; }
  .reset-link { margin-top: 10px; background: none; border: none; color: var(--muted); font-size: 0.78rem; text-decoration: underline; cursor: pointer; }
  .reset-link:hover { color: var(--wrong); }
  .miss-note { margin-top: 8px; font-size: 0.78rem; color: var(--muted); }

  /* ===== quiz screen ===== */
  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .category-tag {
    background: var(--primary);
    color: #fff;
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 0.78rem;
  }
  .progress-bar {
    height: 6px;
    background: #dfe6ee;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-bar > div {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    width: 0%;
    transition: width 0.3s;
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 22px;
    white-space: pre-wrap;
  }
  .question-text .blank {
    background: #fff3e0;
    border-bottom: 2px solid var(--accent);
    padding: 0 6px;
    font-weight: bold;
    color: var(--accent);
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    text-align: left;
    padding: 14px 16px;
    border: 2px solid #cfdce8;
    border-radius: 10px;
    background: #fbfdff;
    font-size: 0.95rem;
    line-height: 1.6;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    gap: 10px;
  }
  @media (hover: hover) {
    .choice-btn:hover:not(:disabled) { border-color: var(--primary); background: #eef5fb; }
  }
  .choice-btn:active:not(:disabled) { border-color: var(--primary); background: #eef5fb; }
  .choice-btn:disabled { cursor: default; }
  .choice-num {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: bold;
  }
  .choice-btn.correct { border-color: var(--correct); background: #eafaf1; }
  .choice-btn.correct .choice-num { background: var(--correct); }
  .choice-btn.wrong { border-color: var(--wrong); background: #fdedec; }
  .choice-btn.wrong .choice-num { background: var(--wrong); }
  .choice-btn.dimmed { opacity: 0.5; }

  .feedback {
    margin-top: 20px;
    border-radius: 10px;
    padding: 16px;
    line-height: 1.7;
    font-size: 0.9rem;
    animation: fadein 0.3s;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .feedback.ok { background: #eafaf1; border-left: 5px solid var(--correct); }
  .feedback.ng { background: #fdedec; border-left: 5px solid var(--wrong); }
  .feedback .verdict { font-weight: bold; font-size: 1.05rem; margin-bottom: 8px; }
  .feedback.ok .verdict { color: var(--correct); }
  .feedback.ng .verdict { color: var(--wrong); }
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    font-size: 1rem;
    font-weight: bold;
    color: #fff;
    background: var(--primary);
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  .next-btn:hover { background: var(--primary-dark); }

  /* ===== result screen ===== */
  .score-circle {
    width: 150px; height: 150px;
    border-radius: 50%;
    margin: 10px auto 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: conic-gradient(var(--accent) calc(var(--pct) * 1%), #e8eef4 0);
    position: relative;
  }
  .score-circle::before {
    content: "";
    position: absolute;
    inset: 12px;
    background: var(--card);
    border-radius: 50%;
  }
  .score-circle .inner { position: relative; text-align: center; }
  .score-circle .pct { font-size: 2rem; font-weight: bold; color: var(--primary-dark); }
  .score-circle .frac { font-size: 0.85rem; color: var(--muted); }
  .result-msg { text-align: center; font-size: 1.05rem; font-weight: bold; margin-bottom: 20px; color: var(--primary-dark); }
  .review-title { font-weight: bold; color: var(--primary-dark); margin: 24px 0 12px; }
  .review-item {
    border: 1px solid #e0e8f0;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    font-size: 0.85rem;
    line-height: 1.7;
  }
  .review-item .q { font-weight: bold; margin-bottom: 6px; }
  .review-item .a { color: var(--correct); }
  .review-item .your { color: var(--wrong); }
  .review-item .exp { color: var(--muted); margin-top: 6px; }
  footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 12px 0 24px; }

  /* ===== スマホ（iPhone等）向け調整 ===== */
  @media (max-width: 480px) {
    header { padding: 12px 0 10px; }
    header h1 { font-size: 1.25rem; }
    .card { padding: 18px 16px; border-radius: 12px; }
    .question-text { font-size: 0.98rem; line-height: 1.75; }
    .choice-btn { padding: 13px 12px; font-size: 0.92rem; }
    .option-grid button { padding: 9px 14px; font-size: 0.85rem; }
    .start-btn, .restart-btn { padding: 15px; font-size: 1.05rem; }
    .stat-label { width: 104px; font-size: 0.78rem; }
    .score-circle { width: 130px; height: 130px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📘 教職教養 ランダム演習</h1>
    <p>教員採用試験対策 — 問題は毎回自動生成されます</p>
  </header>

  <!-- ===== START ===== -->
  <div id="screen-start" class="card">
    <div class="field-label">出題分野</div>
    <div class="option-grid" id="field-select">
      <button data-val="all" class="selected">全分野ミックス</button>
      <button data-val="principle">教育原理・人物</button>
      <button data-val="law">教育法規</button>
      <button data-val="psych">教育心理</button>
      <button data-val="history">教育史・時事用語</button>
      <button data-val="tokyo">🗼 東京都</button>
      <button data-val="weak">🔥 苦手重点</button>
    </div>
    <div class="field-label">問題数</div>
    <div class="option-grid" id="count-select">
      <button data-val="5">5問</button>
      <button data-val="10" class="selected">10問</button>
      <button data-val="20">20問</button>
    </div>
    <button class="start-btn" onclick="startQuiz()">演習をはじめる ▶</button>
    <p class="note">※ 人物・法規条文・心理学用語などのデータベースから、出題形式と選択肢をその場でランダムに組み合わせて生成します。「🔥 苦手重点」では、過去に間違えた問題と誤答率の高い分野を優先して出題します（成績はこの端末に保存されます）。</p>
    <div id="stats-panel"></div>
  </div>

  <!-- ===== QUIZ ===== -->
  <div id="screen-quiz" class="card hidden">
    <div class="quiz-top">
      <span class="category-tag" id="q-category"></span>
      <span id="q-progress-text"></span>
    </div>
    <div class="progress-bar"><div id="q-progress"></div></div>
    <div class="question-text" id="q-text"></div>
    <div class="choices" id="q-choices"></div>
    <div id="q-feedback"></div>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="screen-result" class="card hidden">
    <div class="score-circle" id="score-circle">
      <div class="inner">
        <div class="pct" id="score-pct"></div>
        <div class="frac" id="score-frac"></div>
      </div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <div id="review-area"></div>
    <button class="restart-btn" onclick="showStart()">🔄 新しい問題でもう一度</button>
  </div>

  <footer>問題はローカルで自動生成されています。実際の試験では最新の法令・学習指導要領をご確認ください。</footer>
</div>

<script>
/* =========================================================
   データベース
========================================================= */

// --- 教育思想家・人物 ---
const PERSONS = [
  {name:"コメニウス", country:"チェコ（モラヴィア）", desc:"「あらゆる人にあらゆる事柄を教える」汎知主義を唱え、世界最初の絵入り教科書とされる『世界図絵』を著した。直観教授の先駆者。", work:"大教授学・世界図絵", key:"直観教授・汎知主義"},
  {name:"ルソー", country:"フランス（ジュネーヴ生）", desc:"「子どもの発見者」と呼ばれ、子どもの自然な成長に従う消極教育を主張した。「万物をつくる者の手をはなれるときすべてはよいものであるが…」の書き出しで知られる教育小説を著した。", work:"エミール", key:"消極教育・子どもの発見"},
  {name:"ペスタロッチ", country:"スイス", desc:"孤児や貧民の教育に生涯を捧げ、直観を教育の基礎とするメトーデ（直観教授法）を確立した。「生活が陶冶する」の言葉でも知られる。", work:"隠者の夕暮・シュタンツだより", key:"直観教授・メトーデ"},
  {name:"フレーベル", country:"ドイツ", desc:"世界最初の幼稚園（キンダーガルテン）を創設し、遊具「恩物」を考案した。遊びを通した幼児教育を重視した。", work:"人間の教育", key:"幼稚園の創設・恩物"},
  {name:"ヘルバルト", country:"ドイツ", desc:"教育学を倫理学と心理学に基礎づけて体系化し、教授の過程を「明瞭・連合・系統・方法」の四段階で示した。教育的教授を主張した。", work:"一般教育学", key:"四段階教授法"},
  {name:"デューイ", country:"アメリカ", desc:"シカゴ大学に実験学校を設け、「なすことによって学ぶ」経験主義教育・問題解決学習を提唱した。プラグマティズムの代表的思想家。", work:"学校と社会・民主主義と教育", key:"問題解決学習・経験主義"},
  {name:"キルパトリック", country:"アメリカ", desc:"デューイの理論を発展させ、学習者が自ら目的を立てて遂行するプロジェクト・メソッド（構案法）を提唱した。", work:"プロジェクト・メソッド", key:"プロジェクト・メソッド"},
  {name:"モンテッソーリ", country:"イタリア", desc:"ローマの貧民街に「子どもの家」を開設し、感覚教育を重視した独自の教具による教育法を確立した。医師出身の教育家。", work:"子どもの発見", key:"子どもの家・感覚教育"},
  {name:"エレン・ケイ", country:"スウェーデン", desc:"20世紀は子どもが幸福に育つべき「児童の世紀」であると主張し、児童中心主義の教育を唱えた。", work:"児童の世紀", key:"児童中心主義"},
  {name:"ブルーナー", country:"アメリカ", desc:"「どの教科でも、知的性格をそのままに保って、発達のどの段階の子どもにも効果的に教えることができる」と述べ、発見学習と教科の構造を重視した。", work:"教育の過程", key:"発見学習・教育の現代化"},
  {name:"スキナー", country:"アメリカ", desc:"オペラント条件づけの理論に基づき、スモールステップと即時フィードバックによるプログラム学習を開発した。ティーチング・マシンでも知られる。", work:"プログラム学習", key:"オペラント条件づけ"},
  {name:"ブルーム", country:"アメリカ", desc:"完全習得学習（マスタリー・ラーニング）を提唱し、診断的評価・形成的評価・総括的評価の区分を示した。教育目標の分類学でも知られる。", work:"完全習得学習", key:"マスタリー・ラーニング・形成的評価"},
  {name:"ソクラテス", country:"古代ギリシャ", desc:"対話を通じて相手に無知を自覚させ、真理の発見へ導く問答法（産婆術）を用いた。「無知の知」で知られる。", work:"（著作なし・弟子プラトンが記録）", key:"問答法・産婆術"},
  {name:"ロック", country:"イギリス", desc:"人の心は生まれたときは白紙（タブラ・ラサ）であり、経験によって観念が形成されると考えた。紳士教育論を展開した。", work:"教育に関する考察", key:"タブラ・ラサ・紳士教育"},
  {name:"カント", country:"ドイツ", desc:"「人間は教育によってはじめて人間となることができる」と述べ、教育の必要性を強調した哲学者。", work:"教育学講義", key:"人間は教育によって人間となる"},
  {name:"オーエン", country:"イギリス", desc:"ニュー・ラナークの紡績工場に幼児学校を設け、性格形成学院を創設した。環境が人間の性格を形成すると考えた空想的社会主義者。", work:"新社会観", key:"性格形成学院・幼児学校"},
  {name:"シュタイナー", country:"オーストリア（ドイツで活動）", desc:"人智学に基づき自由ヴァルドルフ学校を創設した。8年間一貫担任制やエポック授業などの独自の教育方法で知られる。", work:"自由ヴァルドルフ学校", key:"ヴァルドルフ教育"},
  {name:"ニイル", country:"イギリス", desc:"「世界で一番自由な学校」と呼ばれるサマーヒル・スクールを創設し、子どもの自由と自治を徹底的に尊重した。", work:"サマーヒル・スクール", key:"自由学校"},
  {name:"福沢諭吉", country:"日本", desc:"「天は人の上に人を造らず」の書き出しで知られる著作で実学を奨励し、慶應義塾を創設した明治の啓蒙思想家。", work:"学問のすゝめ", key:"実学・慶應義塾"},
  {name:"緒方洪庵", country:"日本", desc:"大坂に蘭学塾「適塾（適々斎塾）」を開き、福沢諭吉・大村益次郎ら幕末・明治の人材を多数育てた蘭方医。", work:"適塾", key:"適塾・蘭学"},
  {name:"吉田松陰", country:"日本", desc:"長州萩の私塾「松下村塾」で高杉晋作・伊藤博文ら幕末維新の志士を育てた。", work:"松下村塾", key:"松下村塾"},
  {name:"森有礼", country:"日本", desc:"初代文部大臣として1886年に学校令（帝国大学令・師範学校令・小学校令・中学校令）を公布し、近代学校制度の基礎を築いた。", work:"学校令の公布", key:"初代文部大臣"},
  {name:"及川平治", country:"日本", desc:"明石女子師範学校附属小学校主事として「分団式動的教育法」を提唱し、大正自由教育運動を代表する実践を行った。", work:"分団式動的教育法", key:"大正自由教育"},
  {name:"沢柳政太郎", country:"日本", desc:"成城小学校を創設し、大正自由教育運動の中心となった。「実際的教育学」を提唱した。", work:"成城小学校の創設", key:"大正自由教育・成城小学校"},
  {name:"倉橋惣三", country:"日本", desc:"東京女子高等師範学校附属幼稚園主事として「誘導保育」を提唱し、日本の幼児教育の発展に貢献した。「生活を生活で生活へ」の言葉で知られる。", work:"幼稚園真諦", key:"誘導保育"},
  {name:"ペーターゼン", country:"ドイツ", desc:"イエナ大学附属学校で、学年学級を廃止した異年齢の基幹集団（根幹学級）による合科的・協同的な学校改革プラン「イエナ・プラン」を実践した。", work:"イエナ・プラン", key:"イエナ・プラン"},
  {name:"パーカースト", country:"アメリカ", desc:"自由と協同の原理に基づき、生徒が教師と学習課題の契約（アサインメント）を結んで実験室（ラボラトリー）で自学する「ドルトン・プラン」を創始した。", work:"ドルトン・プラン", key:"ドルトン・プラン"},
];

// --- 教育心理 ---
const PSYCH = [
  {term:"古典的条件づけ（レスポンデント条件づけ）", desc:"パブロフの犬の実験で知られる、中性刺激と無条件刺激を対提示することで条件反射が形成される学習。", person:"パブロフ"},

/* =========================================================
   ユーティリティ
========================================================= */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n, excludeFn) {
  const pool = excludeFn ? arr.filter(x => !excludeFn(x)) : arr.slice();
  return shuffle(pool).slice(0, n);
}

  const others = pickN(PERSONS, 3, x => x.name === p.name).map(x => x.name);
  return {
    field: "principle", itemKey: "person:" + p.name, category: "教育原理・人物",
    question: `次の記述に該当する人物として最も適切なものを選びなさい。\n\n「${p.desc}」`,
    choices: shuffle([p.name, ...others]),
    answer: p.name,
    explanation: `正解は ${p.name}（${p.country}）。キーワードは「${p.key}」。主著・業績：${p.work}。`
  };
}

// --- 人物：人物名 → 主著・業績 ---
function qPersonWork(p) {
  if (p.work.startsWith("（")) return qPersonDesc(p);
  const candidates = PERSONS.filter(x => !x.work.startsWith("（"));
  const others = pickN(candidates, 3, x => x.name === p.name).map(x => x.work);
  return {
    field: "principle", itemKey: "person:" + p.name, category: "教育原理・人物",
    question: `${p.name} の主著または代表的業績として最も適切なものを選びなさい。`,
    choices: shuffle([p.work, ...others]),
    answer: p.work,
    explanation: `${p.name}（${p.country}）の主著・業績は「${p.work}」。${p.desc}`
  };
}

// --- 人物：キーワード → 人物名 ---
function qPersonKey(p) {
  const others = pickN(PERSONS, 3, x => x.name === p.name).map(x => x.name);
  return {
    field: "principle", itemKey: "person:" + p.name, category: "教育原理・人物",
    question: `「${p.key}」と最も関係の深い人物を選びなさい。`,
    choices: shuffle([p.name, ...others]),
    answer: p.name,
    explanation: `正解は ${p.name}。${p.desc}`
  };
}

// --- 法規：穴埋め ---
function qLawBlank(l) {
  const idx = Math.floor(Math.random() * l.blanks.length);
  const correct = l.blanks[idx];
  const text = l.text.replace(`{${idx}}`, "【　？　】").replace(/\{(\d)\}/g, (m, d) => l.blanks[parseInt(d)]);
  const others = pickN(l.distract[idx], 3);
  return {
    field: "law", itemKey: "law:" + l.law + "|" + l.art, category: "教育法規",
    question: `${l.law} ${l.art} の条文中の【　？　】に当てはまる語句を選びなさい。\n\n「${text}」`,
    choices: shuffle([correct, ...others]),
    answer: correct,
    explanation: `正解は「${correct}」。${l.law} ${l.art}：「${lawFull(l)}」`
  };
}

// --- 法規：条文 → 法令名 ---
function qLawName(l) {
  const others = pickN(LAW_NAMES, 3, x => x === l.law);
  return {
    field: "law", itemKey: "law:" + l.law + "|" + l.art, category: "教育法規",
    question: `次の条文が規定されている法令として正しいものを選びなさい。\n\n「${lawFull(l)}」`,
    choices: shuffle([l.law, ...others]),
    answer: l.law,
    explanation: `正解は ${l.law}（${l.art}）。`
  };
}

// --- 心理：説明 → 用語 ---
function qPsychTerm(p) {
  const others = pickN(PSYCH, 3, x => x.term === p.term).map(x => x.term);
  return {
    field: "psych", itemKey: "psych:" + p.term, category: "教育心理",
    question: `次の説明に該当する用語として最も適切なものを選びなさい。\n\n「${p.desc}」`,
    choices: shuffle([p.term, ...others]),
    answer: p.term,
    explanation: `正解は「${p.term}」${p.person.startsWith("（") ? p.person : "（提唱者：" + p.person + "）"}。`
  };
}

// --- 心理：用語 → 提唱者 ---
function qPsychPerson(p) {
  if (p.person.startsWith("（")) return qPsychTerm(p);
  const candidates = PSYCH.filter(x => !x.person.startsWith("（"));
  const others = pickN(candidates, 3, x => x.person === p.person).map(x => x.person);
  return {
    field: "psych", itemKey: "psych:" + p.term, category: "教育心理",
    question: `「${p.term}」と最も関係の深い人物を選びなさい。`,
    choices: shuffle([p.person, ...others]),
    answer: p.person,
    explanation: `正解は ${p.person}。${p.desc}`
  };
}

// --- 教育史：説明 → 事項 or 事項 → 年代 ---
function qHistory(h) {
  if (Math.random() < 0.5) {
    const others = pickN(HISTORY, 3, x => x.event === h.event).map(x => x.event);
    return {
      field: "history", itemKey: "history:" + h.event, category: "教育史",
      question: `次の記述に該当する事項として最も適切なものを選びなさい。\n\n「${h.desc}」`,
      choices: shuffle([h.event, ...others]),
      answer: h.event,
      explanation: `正解は「${h.event}」（${h.year}）。`
    };
  }
  const uniq = [...new Set(pickN(HISTORY, 6, x => x.year === h.year || x.event === h.event).map(x => x.year))].slice(0, 3);
  while (uniq.length < 3) {
    const extra = pick(HISTORY).year;
    if (extra !== h.year && !uniq.includes(extra)) uniq.push(extra);
  }
  return {
    field: "history", itemKey: "history:" + h.event, category: "教育史",
    question: `「${h.event}」が行われた時期として正しいものを選びなさい。`,
    choices: shuffle([h.year, ...uniq]),
    answer: h.year,
    explanation: `正解は ${h.year}。${h.desc}`
  };
}

// --- 時事・生徒指導用語：説明 → 用語 ---
function qTerm(t) {
  const others = pickN(TERMS, 3, x => x.term === t.term).map(x => x.term);
  return {
    field: "history", itemKey: "term:" + t.term, category: t.cat,
    question: `次の説明に該当する語句として最も適切なものを選びなさい。\n\n「${t.desc}」`,
    choices: shuffle([t.term, ...others]),
    answer: t.term,
    explanation: `正解は「${t.term}」。`
  };
}

// --- 東京都ローカル：説明 → 施策・条例名 ---
function qTokyo(t) {
  const others = pickN(TOKYO, 3, x => x.term === t.term).map(x => x.term);
  return {
    field: "tokyo", itemKey: "tokyo:" + t.term, category: "東京都",
    question: `東京都の教育施策等に関する次の説明に該当するものとして最も適切なものを選びなさい。\n\n「${t.desc}」`,
    choices: shuffle([t.term, ...others]),
    answer: t.term,
    explanation: `正解は「${t.term}」。${t.note}`
  };
}

// 種別 → 出題形式（同じ項目でも形式はランダムに変わる）
const FORMATS = {
  person:  p => pick([qPersonDesc, qPersonWork, qPersonKey])(p),
  law:     l => pick([qLawBlank, qLawBlank, qLawName])(l),
  psych:   p => pick([qPsychTerm, qPsychTerm, qPsychPerson])(p),
  history: h => qHistory(h),
  term:    t => qTerm(t),
  tokyo:   t => qTokyo(t),
};
const FIELD_POOLS = {
  principle: [["person", PERSONS]],
  law:       [["law", LAWS]],
  psych:     [["psych", PSYCH]],
  history:   [["history", HISTORY], ["term", TERMS]],
  tokyo:     [["tokyo", TOKYO]],
};
const FIELD_KEYS = ["principle", "law", "psych", "history", "tokyo"];
const FIELD_NAMES = { principle: "教育原理・人物", law: "教育法規", psych: "教育心理", history: "教育史・時事用語", tokyo: "東京都" };

function makeQuestion(kind, item) { return FORMATS[kind](item); }
function randomQuestion(field) {
  const [kind, pool] = pick(FIELD_POOLS[field]);
  return makeQuestion(kind, pick(pool));
}
// 苦手リストのキー（itemKey）から元データを引く
function itemFromKey(key) {
  const i = key.indexOf(":");
  const kind = key.slice(0, i), id = key.slice(i + 1);
  const finders = {
    person:  () => PERSONS.find(p => p.name === id),
    law:     () => LAWS.find(l => l.law + "|" + l.art === id),
    psych:   () => PSYCH.find(p => p.term === id),
    history: () => HISTORY.find(h => h.event === id),
    term:    () => TERMS.find(t => t.term === id),
    tokyo:   () => TOKYO.find(t => t.term === id),
  };
  const item = finders[kind] && finders[kind]();
  return item ? [kind, item] : null;
}

/* =========================================================
   アプリ状態とUI
========================================================= */
let settings = { field: "all", count: 10 };
let quiz = { items: [], index: 0, correct: 0, wrongList: [] };

/* ----- 成績の記録（localStorage） ----- */
const STORE_KEY = "kyoshoku_stats_v1";
function freshStats() {
  const fields = {};
  FIELD_KEYS.forEach(f => fields[f] = { a: 0, w: 0 });
  return { fields, missed: {} };  // missed: itemKey → 未克服の誤答回数
}
function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem(STORE_KEY));
    if (s && s.fields && s.missed) {
      // 分野が後から追加された場合の引き継ぎ
      FIELD_KEYS.forEach(f => { if (!s.fields[f]) s.fields[f] = { a: 0, w: 0 }; });
      return s;
    }
  } catch (e) {}
  return freshStats();
}
function saveStats() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(stats)); } catch (e) {}
}
let stats = loadStats();

function recordAnswer(q, isCorrect) {
  const f = stats.fields[q.field];
  f.a++;
  if (!isCorrect) {
    f.w++;
    stats.missed[q.itemKey] = (stats.missed[q.itemKey] || 0) + 1;
  } else if (stats.missed[q.itemKey]) {
    // 苦手項目に正解できたら1回ぶん克服。0になればリストから外れる
    stats.missed[q.itemKey]--;
    if (stats.missed[q.itemKey] <= 0) delete stats.missed[q.itemKey];
  }
  saveStats();
}

function resetStats() {
  if (!confirm("これまでの成績と苦手リストを消去します。よろしいですか？")) return;
  stats = freshStats();
  saveStats();
  renderStats();
}

// 誤答率の高い分野ほど選ばれやすくする（ラプラス平滑化で未演習分野もゼロにしない）
function weightedField() {
  const weights = FIELD_KEYS.map(f => {
    const s = stats.fields[f];
    return (s.w + 1) / (s.a + 2);
  });
  let r = Math.random() * weights.reduce((a, b) => a + b, 0);
  for (let i = 0; i < FIELD_KEYS.length; i++) {
    r -= weights[i];
    if (r <= 0) return FIELD_KEYS[i];
  }
  return FIELD_KEYS[FIELD_KEYS.length - 1];
}

function renderStats() {
  const el = document.getElementById("stats-panel");
  const total = Object.values(stats.fields).reduce((s, f) => s + f.a, 0);
  if (!total) { el.innerHTML = ""; return; }
  const missedCount = Object.keys(stats.missed).length;
  el.innerHTML =
    `<div class="field-label">📊 これまでの成績</div>` +
    FIELD_KEYS.map(f => {
      const s = stats.fields[f];
      const pct = s.a ? Math.round(((s.a - s.w) / s.a) * 100) : null;
      return `<div class="stat-row">
        <span class="stat-label">${FIELD_NAMES[f]}</span>
        <div class="stat-bar"><div style="width:${pct ?? 0}%"></div></div>
        <span class="stat-pct">${pct === null ? "—" : pct + "%"}</span>
      </div>`;
    }).join("") +
    `<p class="stat-sub">累計 ${total} 問解答 ／ 苦手リスト ${missedCount} 件${missedCount ? "（「🔥 苦手重点」で優先出題されます）" : ""}</p>` +
    `<button class="reset-link" onclick="resetStats()">記録をリセット</button>`;
}

// 設定ボタン
document.querySelectorAll("#field-select button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("#field-select button").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    settings.field = btn.dataset.val;
  };
});
document.querySelectorAll("#count-select button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("#count-select button").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    settings.count = parseInt(btn.dataset.val);
  };
});

function showScreen(id) {
  ["screen-start", "screen-quiz", "screen-result"].forEach(s =>
    document.getElementById(s).classList.toggle("hidden", s !== id));
}
function showStart() { renderStats(); showScreen("screen-start"); }

function buildQuizItems() {
  const items = [];
  const seen = new Set();  // 同一セッション内での同一項目の重複出題を回避
  const add = q => {
    if (!q || seen.has(q.itemKey)) return;
    seen.add(q.itemKey);
    items.push(q);
  };

  if (settings.field === "weak") {
    // 1) 過去に間違えた項目を、誤答回数の多い順に最大6割まで再出題
    const missedKeys = shuffle(Object.keys(stats.missed))
      .sort((a, b) => stats.missed[b] - stats.missed[a]);
    const quota = Math.ceil(settings.count * 0.6);
    for (const key of missedKeys) {
      if (items.length >= quota) break;
      const found = itemFromKey(key);
      if (found) add(makeQuestion(found[0], found[1]));
    }
    // 2) 残りは誤答率の高い分野を重み付きで出題
    let guard = 0;
    while (items.length < settings.count && guard++ < 500) add(randomQuestion(weightedField()));
    return shuffle(items);
  }

  let guard = 0;
  while (items.length < settings.count && guard++ < 500) {
    const field = settings.field === "all" ? pick(FIELD_KEYS) : settings.field;
    add(randomQuestion(field));
  }
  return items;
}

function startQuiz() {
  quiz = { items: buildQuizItems(), index: 0, correct: 0, wrongList: [] };
  showScreen("screen-quiz");
  renderQuestion();
}

function renderQuestion() {
  const q = quiz.items[quiz.index];
  document.getElementById("q-category").textContent = q.category;
  document.getElementById("q-progress-text").textContent = `第 ${quiz.index + 1} 問 / ${quiz.items.length} 問`;
  document.getElementById("q-progress").style.width = `${(quiz.index / quiz.items.length) * 100}%`;
  document.getElementById("q-text").textContent = q.question;
  document.getElementById("q-feedback").innerHTML = "";

  const box = document.getElementById("q-choices");
  box.innerHTML = "";
  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="choice-num">${i + 1}</span><span>${c}</span>`;
    btn.onclick = () => answer(btn, c);
    box.appendChild(btn);
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function answer(clickedBtn, choice) {
  const q = quiz.items[quiz.index];
  const isCorrect = choice === q.answer;
  if (isCorrect) quiz.correct++;
  else quiz.wrongList.push({ q, yourAnswer: choice });
  recordAnswer(q, isCorrect);

  document.querySelectorAll(".choice-btn").forEach(btn => {
    btn.disabled = true;
    const text = btn.querySelector("span:last-child").textContent;
    if (text === q.answer) btn.classList.add("correct");
    else if (btn === clickedBtn) btn.classList.add("wrong");
    else btn.classList.add("dimmed");
  });

  const fb = document.getElementById("q-feedback");
  const isLast = quiz.index === quiz.items.length - 1;
  fb.innerHTML = `
    <div class="feedback ${isCorrect ? "ok" : "ng"}">
      <div class="verdict">${isCorrect ? "⭕ 正解！" : "❌ 不正解…"}</div>
      <div>${q.explanation}</div>
      ${isCorrect
        ? (stats.missed[q.itemKey] ? `<div class="miss-note">👍 苦手項目に正解！あと ${stats.missed[q.itemKey]} 回正解で苦手リストから外れます。</div>` : "")
        : `<div class="miss-note">📌 苦手リストに記録しました。「🔥 苦手重点」モードで優先的に再出題されます。</div>`}
    </div>
    <button class="next-btn" onclick="nextQuestion()">${isLast ? "結果を見る 📊" : "次の問題へ ▶"}</button>
  `;
}

function nextQuestion() {
  quiz.index++;
  if (quiz.index >= quiz.items.length) showResult();
  else renderQuestion();
}

function showResult() {
  const total = quiz.items.length;
  const pct = Math.round((quiz.correct / total) * 100);
  document.getElementById("score-circle").style.setProperty("--pct", pct);
  document.getElementById("score-pct").textContent = `${pct}%`;
  document.getElementById("score-frac").textContent = `${quiz.correct} / ${total} 問正解`;

  let msg;
  if (pct === 100) msg = "🎉 全問正解！すばらしい！この調子で合格へ！";
  else if (pct >= 80) msg = "💮 合格圏内です！間違えた問題を確認して完璧に。";
  else if (pct >= 60) msg = "📖 あと一歩！弱点分野を重点的に復習しましょう。";
  else msg = "💪 まだ伸びしろたっぷり。繰り返しが力になります！";
  document.getElementById("result-msg").textContent = msg;

  const area = document.getElementById("review-area");
  if (quiz.wrongList.length === 0) {
    area.innerHTML = "";
  } else {
    area.innerHTML = `<div class="review-title">📝 間違えた問題の復習（${quiz.wrongList.length}問）</div>` +
      quiz.wrongList.map(w => `
        <div class="review-item">
          <div class="q">${w.q.question.replace(/\n/g, "<br>")}</div>
          <div class="your">あなたの解答：${w.yourAnswer}</div>
          <div class="a">正解：${w.q.answer}</div>
          <div class="exp">${w.q.explanation}</div>
        </div>`).join("");
  }
  showScreen("screen-result");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

renderStats();

// PWA：オフラインでも使えるようにサービスワーカーを登録（https または localhost のみ）
if ("serviceWorker" in navigator &&
    (location.protocol === "https:" || ["localhost", "127.0.0.1"].includes(location.hostname))) {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}
</script>
